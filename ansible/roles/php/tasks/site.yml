- name: Ensure site group exists
  ansible.builtin.group:
    name: site
    system: true

- name: Ensure site user exists
  ansible.builtin.user:
    name: site
    group: site
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create site root directory
  ansible.builtin.file:
    path: /sites/example.com/files
    state: directory
    owner: site
    group: site
    mode: "0755"

- name: Remove default PHP-FPM www pool
  ansible.builtin.file:
    path: "/etc/php/{{ php_version }}/fpm/pool.d/www.conf"
    state: absent
  notify: Restart php-fpm

- name: Deploy site PHP-FPM pool
  ansible.builtin.template:
    src: php-fpm-pool.conf.j2
    dest: "/etc/php/{{ php_version }}/fpm/pool.d/site.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Restart php-fpm

- name: Validate PHP-FPM configuration
  ansible.builtin.command: "php-fpm{{ php_version }} -t"
  changed_when: false
