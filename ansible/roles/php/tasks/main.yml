- name: Validate PHP version
  ansible.builtin.assert:
    that:
      - php_version in php_supported_versions
    fail_msg: "Unsupported php_version '{{ php_version }}'. Supported versions: {{ php_supported_versions | join(', ') }}"

- name: Install prerequisites for apt repositories
  ansible.builtin.apt:
    name:
      - software-properties-common
    state: present
    update_cache: true

- name: Add PHP repository (Ondrej PPA)
  ansible.builtin.apt_repository:
    repo: ppa:ondrej/php
    state: present

- name: Update apt cache after adding PHP repo
  ansible.builtin.apt:
    update_cache: true

- name: Install PHP packages
  ansible.builtin.apt:
    name: "{{ php_packages }}"
    state: present

# TODO: support both systemd-based hosts and Docker targets
- name: Check if default PHP-FPM socket exists
  ansible.builtin.stat:
    path: "/run/php/php{{ php_version }}-fpm.sock"
  register: php_fpm_default_socket

- name: Start PHP-FPM if not running
  ansible.builtin.command: "php-fpm{{ php_version }} -D"
  when: not php_fpm_default_socket.stat.exists
  changed_when: not php_fpm_default_socket.stat.exists
