- name: Validate PHP role variables
  ansible.builtin.import_tasks: validate.yml

- name: Install prerequisites for apt repositories
  ansible.builtin.apt:
    name:
      - software-properties-common
    state: present
    update_cache: true

- name: Add PHP repository (Ondrej PPA)
  ansible.builtin.apt_repository:
    repo: ppa:ondrej/php
    state: present

- name: Update apt cache after adding PHP repo
  ansible.builtin.apt:
    update_cache: true

- name: Install PHP packages
  ansible.builtin.apt:
    name: "{{ php_packages }}"
    state: present

- name: Check if PHP-FPM socket exists
  ansible.builtin.stat:
    path: "{{ php_fpm_socket_path }}"
  register: php_fpm_socket

- name: Start PHP-FPM if not running
  ansible.builtin.command: "{{ php_fpm_command }}"
  when: not php_fpm_socket.stat.exists
  changed_when: not php_fpm_socket.stat.exists

- name: Configure site user and PHP-FPM pool
  ansible.builtin.import_tasks: site.yml
