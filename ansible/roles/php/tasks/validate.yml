- name: Validate PHP version
  ansible.builtin.assert:
    that:
      - php_version in php_supported_versions
    fail_msg: "Unsupported php_version '{{ php_version }}'. Supported versions: {{ php_supported_versions | join(', ') }}"

- name: Validate site configuration
  ansible.builtin.assert:
    that:
      - site is defined
      - site.user is defined
      - site.domain is defined
    fail_msg: "site.user and site.domain must be defined"
