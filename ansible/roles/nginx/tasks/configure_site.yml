- name: Configure nginx for PHP site
  ansible.builtin.copy:
    dest: /etc/nginx/sites-available/{{ site.domain }}
    content: |
      server {
          listen 80;
          root /sites/{{ site.domain }}/files;
          index index.php index.html;

          location / {
              try_files $uri $uri/ =404;
          }

          location ~ \.php$ {
              include snippets/fastcgi-php.conf;
              fastcgi_pass unix:/run/php/php{{ php_version }}-{{ site.user }}.sock;
          }
      }
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Enable nginx site
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ site.domain }}"
    dest: "/etc/nginx/sites-enabled/{{ site.domain }}"
    state: link
  notify: Restart nginx

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false
