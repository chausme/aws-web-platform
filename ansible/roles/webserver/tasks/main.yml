- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Configure nginx for PHP
  ansible.builtin.copy:
    dest: /etc/nginx/sites-available/default
    content: |
      server {
          listen 80;
          root /sites/example.com/files;
          index index.php index.html;

          location / {
              try_files $uri $uri/ =404;
          }

          location ~ \.php$ {
              include snippets/fastcgi-php.conf;
              fastcgi_pass unix:{{ php_fpm_socket_path }};
          }
      }
    owner: root
    group: root
    mode: "0644"

- name: Create PHP test file
  ansible.builtin.copy:
    dest: /sites/example.com/files/index.php
    content: |
      <?php phpinfo();
    owner: site
    group: site
    mode: "0644"

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Check if nginx is running
  ansible.builtin.command: pgrep nginx
  register: webserver_nginx_running
  failed_when: false
  changed_when: false

- name: Start nginx if not running
  ansible.builtin.command: nginx
  when: webserver_nginx_running.rc != 0
  changed_when: webserver_nginx_running.rc != 0
