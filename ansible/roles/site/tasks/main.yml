- name: Validate site configuration
  ansible.builtin.assert:
    that:
      - site is defined
      - site.user is defined
      - site.domain is defined
    fail_msg: "site.user and site.domain must be defined"

- name: Ensure site group exists
  ansible.builtin.group:
    name: "{{ site.user }}"
    system: true

- name: Ensure site user exists
  ansible.builtin.user:
    name: "{{ site.user }}"
    group: "{{ site.user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create site root directory
  ansible.builtin.file:
    path: "/sites/{{ site.domain }}/files"
    state: directory
    owner: "{{ site.user }}"
    group: "{{ site.user }}"
    mode: "0755"

- name: Create PHP test file
  ansible.builtin.copy:
    dest: /sites/{{ site.domain }}/files/index.php
    content: |
      <?php phpinfo();
    owner: "{{ site.user }}"
    group: "{{ site.user }}"
    mode: "0644"
