- name: Validate site configuration
  ansible.builtin.assert:
    that:
      - site is defined
      - site.user is defined
      - site.domain is defined
      - site.app is defined
      - site.app in ['php', 'wordpress']
    fail_msg: "site.user, site.domain, and site.app must be defined and valid"
  tags: ["site"]

- name: Check if site root exists
  ansible.builtin.stat:
    path: "/sites/{{ site.domain }}"
  register: site_root_stat
  tags: ["site"]

- name: Read site root ownership
  ansible.builtin.stat:
    path: "/sites/{{ site.domain }}"
  register: site_root_owner_stat
  when: site_root_stat.stat.exists
  tags: ["site"]

- name: Fail if existing site user differs from configured user
  ansible.builtin.fail:
    msg: >-
      Can't change system user for existing site {{ site.domain }}.
      Existing: {{ site_root_owner_stat.stat.pw_name }}.
      Requested: {{ site.user }}.
  when:
    - site_root_stat.stat.exists
    - site_root_owner_stat.stat.pw_name is defined
    - site_root_owner_stat.stat.pw_name != site.user
  tags: ["site"]

- name: Check if /sites parent directory exists
  ansible.builtin.stat:
    path: /sites
  register: site_parent_stat
  tags: ["site"]

- name: Find existing site directories
  ansible.builtin.find:
    paths: /sites
    file_type: directory
    recurse: false
  register: site_existing_dirs
  when: site_parent_stat.stat.exists
  tags: ["site"]

- name: Initialize existing site user directories list
  ansible.builtin.set_fact:
    site_existing_user_dirs: []
  tags: ["site"]

- name: Collect existing site user directories
  ansible.builtin.set_fact:
    site_existing_user_dirs: "{{ (site_existing_user_dirs | default([])) + [item.path | basename] }}"
  loop: "{{ site_existing_dirs.files | default([]) }}"
  when:
    - site_parent_stat.stat.exists
    - item.pw_name is defined
    - item.pw_name == site.user
    - item.path | basename != site.domain
  loop_control:
    label: "{{ item.path | basename }}"
  tags: ["site"]

- name: Fail if requested system user is already used by another site
  ansible.builtin.fail:
    msg: >-
      Can't use system user {{ site.user }} for new site {{ site.domain }}.
      Already assigned to:
      {{ site_existing_user_dirs | join(', ') }}.
  when:
    - site_existing_user_dirs | default([]) | length > 0
  tags: ["site"]
