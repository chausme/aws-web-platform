- name: Validate PHP version
  ansible.builtin.assert:
    that:
      - php_version in php_site_supported_versions
    fail_msg: "Unsupported php_version '{{ php_version }}'. Supported versions: {{ php_site_supported_versions | join(', ') }}"

- name: Install PHP packages
  ansible.builtin.apt:
    name: "{{ php_site_packages }}"
    state: present

- name: Deploy site PHP-FPM pool
  ansible.builtin.template:
    src: php-fpm-pool.conf.j2
    dest: "/etc/php/{{ php_version }}/fpm/pool.d/{{ site.user }}.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Reload php-fpm

- name: Validate PHP-FPM configuration
  ansible.builtin.command: "php-fpm{{ php_version }} -t"
  changed_when: false

  # TODO: support both systemd-based hosts and Docker targets
- name: Check if site PHP-FPM socket exists
  ansible.builtin.stat:
    path: "/run/php/php{{ php_version }}-{{ site.user }}.sock"
  register: php_site_socket

- name: Start PHP-FPM if not running
  ansible.builtin.command: "php-fpm{{ php_version }} -D"
  when: not php_site_socket.stat.exists
  changed_when: not php_site_socket.stat.exists
